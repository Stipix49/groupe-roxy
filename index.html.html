ing:2px;}.sidebar-logo span{font-size:11px;color:var(--muted);font-family:var(--font-mono);}.sidebar-role{padding:12px 20px;font-size:11px;font-family:var(--font-mono);color:var(--gold);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px;}nav{flex:1;padding:12px 0;overflow-y:auto;}nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;border-left:3px solid transparent;}nav a:hover{color:var(--text);background:rgba(200,164,90,0.07);}nav a.active{color:var(--gold2);border-left-color:var(--gold);background:rgba(200,164,90,0.1);}nav a .nav-icon{font-size:15px;width:20px;text-align:center;}.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-display);transition:all .2s;}.btn-logout:hover{border-color:var(--danger);color:var(--danger);}.main{margin-left:220px;min-height:100vh;}.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}.topbar h1{font-size:18px;font-weight:800;color:var(--text);letter-spacing:1px;}.sync-badge{font-family:var(--font-mono);font-size:11px;color:var(--muted);}.sync-badge.ok{color:var(--green);}.content{padding:24px 32px;max-width:1400px;}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;transition:border .2s;}.stat-card:hover{border-color:var(--border2);}.stat-label{font-size:11px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}.stat-value{font-size:26px;font-weight:800;color:var(--gold2);line-height:1.3;padding:2px 0;font-family:'Outfit',sans-serif;}.stat-value.green{color:var(--green);}.stat-value.red{color:var(--danger);}.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--font-mono);}.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}.form-group{display:flex;flex-direction:column;gap:6px;}label{font-size:12px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;}input,select,textarea{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 12px;font-family:var(--font-display);font-size:14px;outline:none;transition:border .2s;}input:hover,select:hover,textarea:hover{border-color:var(--gold);}input:focus,select:focus,textarea:focus{border-color:var(--gold2);}select option{background:var(--bg2);}textarea{resize:vertical;min-height:70px;}.btn-add{padding:11px 22px;background:var(--gold);border:none;border-radius:8px;color:#0d0d0d;font-weight:700;font-family:var(--font-display);font-size:13px;cursor:pointer;transition:background .2s;letter-spacing:0.5px;}.btn-add:hover{background:var(--gold2);}.btn-danger{padding:6px 12px;background:transparent;border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-size:12px;cursor:pointer;font-family:var(--font-display);transition:all .2s;}.btn-danger:hover{background:var(--danger);color:#fff;}.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:16px;}.table-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;font-family:var(--font-mono);}table{width:100%;border-collapse:collapse;font-size:13px;}th{padding:11px 14px;text-align:left;font-size:11px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);}tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(200,164,90,0.04);}.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;}.badge-propre{background:rgba(39,174,96,0.15);color:#27ae60;border:1px solid rgba(39,174,96,0.3);}.badge-sale{background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.3);}.section-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:1px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}.form-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;}.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:24px;}.stock-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px 16px;text-align:center;transition:border .2s;}.stock-item:hover{border-color:var(--border2);}.stock-emoji{font-size:32px;margin-bottom:10px;display:block;}.stock-name{font-size:12px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;margin-bottom:8px;}.stock-qty{font-size:28px;font-weight:800;color:var(--gold2);font-family:'Outfit',sans-serif;}.stock-meta{font-size:11px;color:var(--muted);margin-top:6px;font-family:var(--font-mono);}.contact-card{background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:18px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}.contact-icon{font-size:28px;}.contact-info h3{font-size:13px;color:var(--gold2);font-weight:700;margin-bottom:4px;letter-spacing:1px;}.contact-info p{font-size:12px;color:var(--muted);font-family:var(--font-mono);}footer{text-align:center;padding:28px;font-size:12px;color:var(--muted);font-family:var(--font-mono);border-top:1px solid var(--border);margin-top:40px;}.config-banner{background:rgba(200,164,90,0.1);border:1px solid var(--gold);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:12px;font-family:var(--font-mono);color:var(--gold2);display:none;}.money-tabs{display:flex;gap:8px;margin-bottom:14px;}.money-tab{padding:6px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--muted);background:transparent;font-family:var(--font-mono);transition:all .2s;}.money-tab.active{background:var(--gold);color:#0d0d0d;border-color:var(--gold);}.tab-page{display:none;}.tab-page.active{display:block;}@media (max-width:768px){.sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:60px;flex-direction:row;border-right:none;border-top:1px solid var(--border);}.sidebar-logo{display:none;}.sidebar-role{display:none;}.sidebar-footer{display:none;}nav{display:flex;flex-direction:row;padding:0;overflow-x:auto;overflow-y:hidden;width:100%;}nav a{flex-direction:column;gap:3px;padding:8px 12px;font-size:10px;border-left:none;border-top:3px solid transparent;min-width:60px;justify-content:center;align-items:center;white-space:nowrap;}nav a.active{border-top-color:var(--gold);border-left-color:transparent;}nav a .nav-icon{font-size:18px;width:auto;}.main{margin-left:0;padding-bottom:60px;}.topbar{padding:12px 16px;}.topbar h1{font-size:15px;}.content{padding:16px;}.cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}.form-row{grid-template-columns:1fr 1fr;gap:10px;}.stat-value{font-size:20px;}table{font-size:12px;}th,td{padding:8px 10px;}.btn-add{width:100%;}div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}}@media (max-width:400px){nav a{font-size:9px;padding:6px 8px;min-width:50px;}.cards-grid{grid-template-columns:1fr 1fr;}.form-row{grid-template-columns:1fr;}}.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}.shop-item{background:var( <body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <h1>⚜ ROXY</h1>
    <p>OPÉRATIONS — ACCÈS SÉCURISÉ</p>
    <select id="login-role">
      <option value="">— Sélectionner votre rôle —</option>
      <option value="lead">Lead</option>
      <option value="colead">Co-Lead</option>
      <option value="membre">Membre</option>
      <option value="visiteur">Visiteur</option>
    </select>
    <input type="password" id="login-pass" placeholder="Mot de passe" />
    <button class="btn-gold" onclick="doLogin()">ENTRER</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>⚜ ROXY</h2>
    </div>
    <div class="sidebar-role" id="role-display">—</div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">✕ DÉCONNEXION</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="page-title">DASHBOARD</h1>
        <div id="page-sub" style="font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:2px;letter-spacing:0.5px"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="sync-badge" id="sync-status">● sync...</span>
        <button class="btn-logout" onclick="doLogout()" style="display:none;padding:6px 12px;font-size:11px" id="mobile-logout">✕</button>
      </div>
    </div>
    <div class="content">
      <!-- pages -->
      <div id="page-dashboard" class="tab-page"></div>
      <div id="page-achats" class="tab-page"></div>
      <div id="page-ventes-clients" class="tab-page"></div>
      <div id="page-stock" class="tab-page"></div>
      <div id="page-plantation" class="tab-page"></div>
      <div id="page-fabrication" class="tab-page"></div>
      <div id="page-retraits" class="tab-page"></div>
      <div id="page-ventes-membres" class="tab-page"></div>
      <div id="page-actions" class="tab-page"></div>
      <div id="page-magasin" class="tab-page"></div>
    </div>
    <footer>© Tous droits réservés Roxy Larimar</footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    return false;
